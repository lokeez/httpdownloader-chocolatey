name: AU

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@main

      - name: Install AU
        shell: pwsh
        run: |
          Install-Module au -Scope CurrentUser -Force
          Import-Module au
          Get-Command Update-Package

      - name: Run AU update
        shell: pwsh
        run: |
          Set-Location "$env:GITHUB_WORKSPACE\httpdownloader"
          pwsh -File "$env:GITHUB_WORKSPACE\httpdownloader\update.ps1"

      - name: Run verifier
        shell: pwsh
        run: |
          Set-Location "$env:GITHUB_WORKSPACE\httpdownloader"
          ./tools/verifier.ps1

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          $diff = git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "AU: update package"
            git push
          } else {
            Write-Host "No changes to commit"
          }
