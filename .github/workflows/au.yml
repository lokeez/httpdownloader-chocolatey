name: AU

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install AU
        shell: pwsh
        run: |
          Install-Module au -Scope CurrentUser -Force
          Import-Module au
          Get-Command Update-Package

      - name: Run AU update
        shell: pwsh
        run: |
          # AU потребує що pwd = директорія пакету (де лежить nuspec)
          # Set-Location всередині update.ps1 через $PSScriptRoot це забезпечує
          # але тільки якщо ми не міняємо pwd ззовні після цього
          Set-Location "$env:GITHUB_WORKSPACE"
          
          # Запускаємо через dot-sourcing щоб Set-Location з $PSScriptRoot
          # застосувався до поточного процесу, а не до дочірнього
          . "$env:GITHUB_WORKSPACE\update.ps1"

      - name: Run verifier
        shell: pwsh
        run: ./tools/verifier.ps1

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          $diff = git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "AU: update package"
            git push
          } else {
            Write-Host "No changes to commit"
          }
